apiVersion: apps/v1
kind: Deployment
metadata:
  name: CLAW_INSTANCE_NAME-device-pairing
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: claw-device-pairing
  template:
    metadata:
      labels:
        app.kubernetes.io/name: claw-device-pairing
    spec:
      enableServiceLinks: false
      serviceAccountName: CLAW_INSTANCE_NAME-device-pairing
      automountServiceAccountToken: true
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: device-pairing
          image: quay.io/codeready-toolchain/claw-device-pairing:latest
          imagePullPolicy: Always
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: CLAW_INSTANCE
              value: CLAW_INSTANCE_NAME
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 500m
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 2
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
