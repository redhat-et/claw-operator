apiVersion: apps/v1
kind: Deployment
metadata:
  name: CLAW_INSTANCE_NAME
  labels:
    app: claw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: claw
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: claw
    spec:
      enableServiceLinks: false
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        # --- init-volume: PVC subdirectory bootstrap ---
        #
        # On OpenShift, the restricted SCC assigns a UID from the namespace
        # range (e.g. 1001970000) and drops all capabilities. PVC root
        # directories are created by the storage provisioner as root:<fsGroup>,
        # so the running user can write files (via group perms + setgid) but
        # is NOT the owner.
        #
        # OpenClaw ≥ 2026.5.12 (commit b971ebaaab, PR #77907) added a
        # chmodSync(stateDir, 0o700) call in exec-approvals.ts that runs
        # before every shell command. Linux chmod requires euid == file owner
        # or CAP_FOWNER — neither holds when the PVC root is owned by root
        # and the container runs as a namespace-assigned UID. This causes
        # every exec tool call to fail with EPERM.
        #
        # Fix: all containers mount the PVC via subPath ("home") instead of
        # the raw root. This init container creates that subdirectory — owned
        # by the running user — so chmod succeeds. Existing PVCs with data at
        # the root need their PVC deleted and recreated (no auto-migration).
        #
        # The init-volume container uses the same OpenClaw image as gateway so
        # that it runs as the same UID on both OpenShift (namespace-assigned)
        # and vanilla Kubernetes (image default 1000), keeping the 0700 dir
        # accessible to all subsequent containers without world-writable bits.
        #
        - name: init-volume
          image: ghcr.io/openclaw/openclaw:slim
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          command:
            - sh
            - -c
            - mkdir -p -m 0700 /mnt/pvc/home
          resources:
            requests:
              memory: 16Mi
              cpu: 10m
            limits:
              memory: 32Mi
              cpu: 50m
          volumeMounts:
            - name: claw-home
              mountPath: /mnt/pvc
        - name: init-config
          image: ghcr.io/openclaw/openclaw:slim
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          command:
            - node
            - /config/merge.js
          env:
            - name: CLAW_CONFIG_MODE
              value: merge
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 200m
          volumeMounts:
            - name: claw-home
              mountPath: /home/node/.openclaw
              subPath: home
            - name: config
              mountPath: /config
        - name: wait-for-proxy
          image: mirror.gcr.io/library/busybox:1.37
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          command:
            - sh
            - -c
            - |
              TIMEOUT_SECONDS=120
              elapsed=0
              echo "[wait-for-proxy] waiting for CLAW_INSTANCE_NAME-proxy:8080 (timeout ${TIMEOUT_SECONDS}s)..."
              while ! nc -z CLAW_INSTANCE_NAME-proxy 8080 2>/dev/null; do
                elapsed=$((elapsed + 1))
                if [ "$elapsed" -ge "$TIMEOUT_SECONDS" ]; then
                  echo "[wait-for-proxy] ERROR: CLAW_INSTANCE_NAME-proxy:8080 not reachable after ${TIMEOUT_SECONDS}s"
                  exit 1
                fi
                if [ $((elapsed % 15)) -eq 0 ]; then
                  echo "[wait-for-proxy] still waiting... (${elapsed}s/${TIMEOUT_SECONDS}s)"
                fi
                sleep 1
              done
              echo "[wait-for-proxy] proxy is up (after ${elapsed}s)"
          resources:
            requests:
              memory: 16Mi
              cpu: 10m
            limits:
              memory: 32Mi
              cpu: 50m
      containers:
        - name: gateway
          image: ghcr.io/openclaw/openclaw:slim
          imagePullPolicy: IfNotPresent
          command:
            - tini
            - -s
            - --
            - node
            - /app/dist/index.js
            - gateway
            - run
          ports:
            - name: gateway
              containerPort: 18789
              protocol: TCP
          env:
            - name: HOME
              value: /home/node
            - name: OPENCLAW_HOME
              value: /home/node
            - name: OPENCLAW_STATE_DIR
              value: /home/node/.openclaw
            - name: OPENCLAW_CONFIG_PATH
              value: /home/node/.openclaw/openclaw.json
            - name: NODE_ENV
              value: production
            - name: OPENCLAW_PROXY_ACTIVE
              value: "1"
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: CLAW_INSTANCE_NAME-gateway-token
                  key: token
            - name: HTTP_PROXY
              value: http://CLAW_INSTANCE_NAME-proxy:8080
            - name: HTTPS_PROXY
              value: http://CLAW_INSTANCE_NAME-proxy:8080
            - name: http_proxy
              value: http://CLAW_INSTANCE_NAME-proxy:8080
            - name: https_proxy
              value: http://CLAW_INSTANCE_NAME-proxy:8080
            - name: NO_PROXY
              value: localhost,127.0.0.1,CLAW_INSTANCE_NAME-proxy
            - name: no_proxy
              value: localhost,127.0.0.1,CLAW_INSTANCE_NAME-proxy
            - name: NODE_USE_ENV_PROXY
              value: "1"
            - name: NPM_CONFIG_CACHE
              value: /home/node/.cache/npm
            - name: CODEX_HOME
              value: /home/node/.config/codex
            - name: NODE_EXTRA_CA_CERTS
              value: /etc/proxy-ca/ca.crt
            - name: SSL_CERT_FILE
              value: /etc/proxy-ca/ca.crt
            - name: REQUESTS_CA_BUNDLE
              value: /etc/proxy-ca/ca.crt
            - name: CURL_CA_BUNDLE
              value: /etc/proxy-ca/ca.crt
            - name: GIT_SSL_CAINFO
              value: /etc/proxy-ca/ca.crt
            # Rewrite all SSH URL forms to HTTPS — the slim image has no ssh
            # binary, and some npm packages (e.g. @whiskeysockets/baileys →
            # libsignal-node) declare git SSH dependencies that fail without it.
            - name: GIT_CONFIG_COUNT
              value: "3"
            - name: GIT_CONFIG_KEY_0
              value: url.https://github.com/.insteadOf
            - name: GIT_CONFIG_VALUE_0
              value: git+ssh://git@github.com/
            - name: GIT_CONFIG_KEY_1
              value: url.https://github.com/.insteadOf
            - name: GIT_CONFIG_VALUE_1
              value: ssh://git@github.com/
            - name: GIT_CONFIG_KEY_2
              value: url.https://github.com/.insteadOf
            - name: GIT_CONFIG_VALUE_2
              value: "git@github.com:"
          resources:
            requests:
              memory: 1Gi
              cpu: 250m
            limits:
              memory: 4Gi
              cpu: "2"
          startupProbe:
            tcpSocket:
              port: 18789
            failureThreshold: 60
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 18789
            periodSeconds: 30
            timeoutSeconds: 15
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: 18789
            periodSeconds: 10
            timeoutSeconds: 10
          volumeMounts:
            - name: claw-home
              mountPath: /home/node/.openclaw
              subPath: home
            - name: claw-home
              mountPath: /home/node/.local
              subPath: home/.local
            - name: claw-home
              mountPath: /home/node/.cache
              subPath: home/.cache
            - name: claw-home
              mountPath: /home/node/.config
              subPath: home/.config
            - name: tmp-volume
              mountPath: /tmp
            - name: proxy-ca
              mountPath: /etc/proxy-ca
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: claw-home
          persistentVolumeClaim:
            claimName: CLAW_INSTANCE_NAME-home-pvc
        - name: config
          configMap:
            name: CLAW_INSTANCE_NAME-config
        - name: tmp-volume
          emptyDir: {}
        - name: proxy-ca
          secret:
            secretName: CLAW_INSTANCE_NAME-proxy-ca
            items:
              - key: ca.crt
                path: ca.crt
