apiVersion: apps/v1
kind: Deployment
metadata:
  name: CLAW_INSTANCE_NAME-proxy
  labels:
    app: claw-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: claw-proxy
  template:
    metadata:
      labels:
        app: claw-proxy
    spec:
      enableServiceLinks: false
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: proxy
          image: claw-proxy:latest
          imagePullPolicy: IfNotPresent
          args:
            - --config=/etc/proxy/proxy-config.json
            - --ca-cert=/etc/proxy/ca/ca.crt
            - --ca-key=/etc/proxy/ca/ca.key
            - --listen=:8080
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 500m
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          volumeMounts:
            - name: proxy-config
              mountPath: /etc/proxy/proxy-config.json
              subPath: proxy-config.json
              readOnly: true
            - name: proxy-ca
              mountPath: /etc/proxy/ca
              readOnly: true
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: proxy-config
          configMap:
            name: CLAW_INSTANCE_NAME-proxy-config
        - name: proxy-ca
          secret:
            secretName: CLAW_INSTANCE_NAME-proxy-ca
