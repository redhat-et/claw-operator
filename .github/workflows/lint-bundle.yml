name: Lint Bundle

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  lint-bundle:
    name: Bundle Validation
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Generate bundle
        run: make bundle

      - name: Validate bundle
        run: bin/operator-sdk bundle validate ./bundle
