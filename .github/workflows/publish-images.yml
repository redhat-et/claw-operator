name: Publish Images

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      quay_namespace:
        description: Quay namespace to publish into
        required: false
        default: redhat-et
      publish_latest:
        description: Also tag the operator and proxy images as latest
        required: false
        type: boolean
        default: true

env:
  DEFAULT_QUAY_NAMESPACE: redhat-et

jobs:
  publish-images:
    name: Build and Publish
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || vars.QUAY_PUBLISH_ENABLED == 'true'
    permissions:
      contents: read
    steps:
      - name: Clone the code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: go.mod

      - name: Resolve image metadata
        env:
          INPUT_QUAY_NAMESPACE: ${{ github.event.inputs.quay_namespace }}
          INPUT_PUBLISH_LATEST: ${{ github.event.inputs.publish_latest }}
        run: |
          set -euo pipefail
          SHA=$(git rev-parse --short HEAD)
          QUAY_NAMESPACE="${INPUT_QUAY_NAMESPACE:-${DEFAULT_QUAY_NAMESPACE}}"
          PUBLISH_LATEST="${INPUT_PUBLISH_LATEST:-true}"
          {
            echo "SHA=${SHA}"
            echo "QUAY_NAMESPACE=${QUAY_NAMESPACE}"
            echo "PUBLISH_LATEST=${PUBLISH_LATEST}"
            echo "OPERATOR_IMAGE=quay.io/${QUAY_NAMESPACE}/claw-operator:${SHA}"
            echo "OPERATOR_LATEST_IMAGE=quay.io/${QUAY_NAMESPACE}/claw-operator:latest"
            echo "PROXY_IMAGE=quay.io/${QUAY_NAMESPACE}/claw-proxy:${SHA}"
            echo "PROXY_LATEST_IMAGE=quay.io/${QUAY_NAMESPACE}/claw-proxy:latest"
          } >> "${GITHUB_ENV}"

      - name: Build operator image
        run: |
          make container-build IMG="${OPERATOR_IMAGE}"
          if [ "${PUBLISH_LATEST}" = "true" ]; then
            podman tag "${OPERATOR_IMAGE}" "${OPERATOR_LATEST_IMAGE}"
          fi

      - name: Build proxy image
        run: |
          make container-build-proxy PROXY_IMG="${PROXY_IMAGE}"
          if [ "${PUBLISH_LATEST}" = "true" ]; then
            podman tag "${PROXY_IMAGE}" "${PROXY_LATEST_IMAGE}"
          fi

      - name: Login to Quay.io
        env:
          QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
          QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
        run: |
          set -euo pipefail
          REGISTRY_AUTH_FILE="${RUNNER_TEMP}/containers-auth.json"
          export REGISTRY_AUTH_FILE
          echo "REGISTRY_AUTH_FILE=${REGISTRY_AUTH_FILE}" >> "${GITHUB_ENV}"
          if [ -z "${QUAY_USERNAME}" ] || [ -z "${QUAY_PASSWORD}" ]; then
            echo "::error::Set QUAY_USERNAME and QUAY_PASSWORD."
            exit 1
          fi
          printf '%s' "${QUAY_PASSWORD}" | podman login --authfile "${REGISTRY_AUTH_FILE}" --username "${QUAY_USERNAME}" --password-stdin quay.io
          podman login --authfile "${REGISTRY_AUTH_FILE}" --get-login quay.io

      - name: Push operator image
        run: |
          make container-push IMG="${OPERATOR_IMAGE}"
          if [ "${PUBLISH_LATEST}" = "true" ]; then
            podman push "${OPERATOR_LATEST_IMAGE}"
          fi

      - name: Push proxy image
        run: |
          make container-push-proxy PROXY_IMG="${PROXY_IMAGE}"
          if [ "${PUBLISH_LATEST}" = "true" ]; then
            podman push "${PROXY_LATEST_IMAGE}"
          fi

      - name: Publish staging bundle and catalog
        run: make push-to-quay-staging QUAY_NAMESPACE="${QUAY_NAMESPACE}"

      - name: Create Kind cluster for scorecard
        continue-on-error: true
        id: kind
        run: |
          make kind
          bin/kind create cluster --name scorecard

      - name: Wait for cluster ready
        id: cluster_ready
        if: steps.kind.outcome == 'success'
        continue-on-error: true
        run: |
          kubectl wait --for=condition=Ready nodes --all --timeout=60s
          kubectl -n default wait --for=jsonpath='{.metadata.name}'=default serviceaccount/default --timeout=60s

      - name: Run scorecard tests
        if: steps.kind.outcome == 'success' && steps.cluster_ready.outcome == 'success'
        continue-on-error: true
        run: |
          bin/operator-sdk scorecard ./bundle \
            --kubeconfig=$HOME/.kube/config \
            --wait-time=120s \
            --output=text || echo "::warning::Scorecard tests failed (non-blocking)"

      - name: Cleanup Kind cluster
        if: always() && steps.kind.outcome == 'success'
        run: bin/kind delete cluster --name scorecard
