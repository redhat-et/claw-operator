---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: claws.claw.sandbox.redhat.com
spec:
  group: claw.sandbox.redhat.com
  names:
    kind: Claw
    listKind: ClawList
    plural: claws
    singular: claw
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].reason
      name: Reason
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Claw is the Schema for the claws API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ClawSpec defines the desired state of Claw
            properties:
              agentFiles:
                description: |-
                  AgentFiles seeds OpenClaw workspace files from a ConfigMap archive or Git repository.
                  Works with both operator-managed and user-managed modes.
                properties:
                  applyPolicy:
                    default: IfMissing
                    description: |-
                      ApplyPolicy controls whether seeded files overwrite existing PVC files.
                      Defaults to IfMissing so runtime edits survive restarts.
                    enum:
                    - IfMissing
                    - Always
                    type: string
                  configMapRef:
                    description: ConfigMapRef references a ConfigMap containing an
                      agentfiles.tgz archive.
                    properties:
                      key:
                        default: agentfiles.tgz
                        description: |-
                          Key is the ConfigMap data or binaryData key containing a gzipped tar archive.
                          Defaults to agentfiles.tgz.
                        type: string
                      name:
                        description: Name is the ConfigMap name in the Claw namespace.
                        minLength: 1
                        type: string
                    required:
                    - name
                    type: object
                  git:
                    description: Git clones an agent files tree from a Git repository
                      in the init container.
                    properties:
                      path:
                        description: |-
                          Path is the subdirectory within the repository containing agent files.
                          Defaults to the repository root.
                        type: string
                      ref:
                        description: Ref is the branch, tag, or commit to check out.
                          Defaults to the repository default branch.
                        type: string
                      secretRef:
                        description: |-
                          SecretRef references a Secret containing Git credentials for private
                          repositories. The Secret must have "username" and "password" keys.
                          For GitHub, use a Personal Access Token as the password.
                          For GitLab, use a deploy token or project access token.
                        properties:
                          name:
                            description: Name is the Secret name in the Claw namespace.
                            minLength: 1
                            type: string
                        required:
                        - name
                        type: object
                      url:
                        description: URL is the Git repository URL.
                        minLength: 1
                        pattern: ^https://
                        type: string
                    required:
                    - url
                    type: object
                  readOnly:
                    description: |-
                      ReadOnly lists workspace-relative paths to mount read-only on the
                      gateway container. The agent gets "read-only file system" when it
                      tries to modify protected files.
                      Individual files (e.g., "SOUL.md") get subPath mounts.
                      Directories (trailing "/" or "/**") get whole-directory mounts.
                    items:
                      type: string
                    type: array
                type: object
                x-kubernetes-validations:
                - message: one of configMapRef or git is required
                  rule: has(self.configMapRef) || has(self.git)
                - message: configMapRef and git are mutually exclusive
                  rule: '!(has(self.configMapRef) && has(self.git))'
              auth:
                description: |-
                  Auth configures gateway authentication. Defaults to token-based
                  authentication with device pairing disabled. Set mode to "password" for
                  shared-password access, or set disableDevicePairing to false to enable
                  device pairing.
                properties:
                  disableDevicePairing:
                    description: |-
                      DisableDevicePairing disables browser device identity checks
                      (maps to gateway.controlUi.dangerouslyDisableDeviceAuth upstream).
                      Defaults to true (device pairing is disabled by default).
                      Set to false to enable device pairing.
                    type: boolean
                  mode:
                    default: token
                    description: |-
                      Mode selects the authentication mechanism: "token" (default) uses an
                      auto-generated token, "password" uses a shared password from a Secret.
                    enum:
                    - token
                    - password
                    type: string
                  passwordSecretRef:
                    description: |-
                      PasswordSecretRef references a Secret key holding the shared password.
                      Required when mode is "password".
                    properties:
                      key:
                        description: Key is the key in the Secret's data map
                        minLength: 1
                        type: string
                      name:
                        description: Name is the name of the Secret
                        minLength: 1
                        type: string
                      role:
                        description: |-
                          Role distinguishes multiple secrets for the same credential.
                          Required when multiple secretRef entries are present (e.g., Slack botToken/appToken).
                        maxLength: 63
                        type: string
                    required:
                    - key
                    - name
                    type: object
                type: object
                x-kubernetes-validations:
                - message: passwordSecretRef is required when mode is password
                  rule: self.mode != 'password' || has(self.passwordSecretRef)
              config:
                description: Config provides user-supplied OpenClaw configuration
                  and merge behavior.
                properties:
                  management:
                    allOf:
                    - enum:
                      - operator
                      - user
                    - enum:
                      - operator
                      - user
                    default: operator
                    description: |-
                      Management controls ownership of openclaw.json after first boot.
                      "operator" (default) continues to merge operator-managed config on every
                      pod start. "user" seeds provider/model config once, then preserves runtime
                      edits while still enforcing gateway infrastructure and authentication.
                    type: string
                  mergeMode:
                    allOf:
                    - enum:
                      - merge
                      - overwrite
                    - enum:
                      - merge
                      - overwrite
                    default: merge
                    description: |-
                      MergeMode controls how operator config is applied on pod start.
                      "merge" (default) deep-merges operator settings into the existing
                      user config, preserving user-owned keys. "overwrite" fully replaces
                      the config on every pod start.
                    type: string
                  raw:
                    description: |-
                      Raw is inline openclaw.json configuration as arbitrary JSON.
                      Keys set here are merged into operator.json before the enrichment
                      pipeline runs. User-set keys take precedence over operator defaults
                      for non-security-critical settings.
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                type: object
              credentials:
                description: Credentials configures proxy credential injection per
                  domain.
                items:
                  description: CredentialSpec defines a single credential entry for
                    proxy injection.
                  properties:
                    allowedPaths:
                      description: |-
                        AllowedPaths restricts which URL paths the proxy permits for this domain.
                        Each entry is a path prefix (e.g., "/v1/api/"). If empty, all paths are allowed.
                      items:
                        type: string
                      type: array
                    apiKey:
                      description: APIKey configures custom header injection. Required
                        when type is "apiKey".
                      properties:
                        header:
                          description: Header name where the API key is injected (e.g.,
                            "x-goog-api-key", "x-api-key")
                          minLength: 1
                          type: string
                        valuePrefix:
                          description: |-
                            ValuePrefix is prepended to the secret value before injection.
                            Examples: "Bot " (Discord), "Basic " (pre-encoded basic auth).
                          type: string
                      required:
                      - header
                      type: object
                    channel:
                      description: |-
                        Channel declares this credential as a messaging channel integration.
                        When set, the operator enables the channel in OpenClaw's config and
                        infers proxy defaults (type, domain, injection config, companion routes).
                        Known values: telegram, discord, slack, whatsapp.
                        Mutually exclusive with provider.
                      type: string
                    channelConfig:
                      description: |-
                        ChannelConfig is opaque JSON deep-merged into the channel's config block
                        in operator.json. Use for channel-specific settings (dmPolicy, allowFrom, etc.).
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                    defaultHeaders:
                      additionalProperties:
                        type: string
                      description: |-
                        DefaultHeaders are injected on every proxied request for this credential,
                        in addition to the credential itself (e.g., "anthropic-version: 2023-06-01").
                      type: object
                    domain:
                      description: |-
                        Domain the proxy matches against the request Host header.
                        Exact match: "api.github.com". Suffix match: ".googleapis.com" (leading dot).
                        Optional for known providers and channels — the operator infers the default domain.
                      type: string
                    gcp:
                      description: GCP configures GCP service account credential injection.
                        Required when type is "gcp".
                      properties:
                        location:
                          description: Location is the GCP region (e.g., us-central1)
                          minLength: 1
                          type: string
                        project:
                          description: Project is the GCP project ID
                          minLength: 1
                          type: string
                      required:
                      - location
                      - project
                      type: object
                    name:
                      description: Name uniquely identifies this credential entry.
                      minLength: 1
                      type: string
                    oauth2:
                      description: OAuth2 configures client credentials token exchange.
                        Required when type is "oauth2".
                      properties:
                        clientID:
                          description: ClientID for the OAuth2 client credentials
                            flow
                          minLength: 1
                          type: string
                        scopes:
                          description: Scopes requested during token exchange
                          items:
                            type: string
                          type: array
                        tokenURL:
                          description: TokenURL is the OAuth2 token endpoint
                          minLength: 1
                          type: string
                      required:
                      - clientID
                      - tokenURL
                      type: object
                    pathToken:
                      description: PathToken configures URL path token injection.
                        Required when type is "pathToken".
                      properties:
                        prefix:
                          description: Prefix is prepended before the token in the
                            URL path (e.g., "/bot" for Telegram)
                          minLength: 1
                          type: string
                      required:
                      - prefix
                      type: object
                    provider:
                      description: |-
                        Provider maps this credential to an OpenClaw LLM provider (e.g., "google", "anthropic", "openai", "openrouter").
                        When set, the controller configures gateway routing and generates the provider entry in openclaw.json.
                        Mutually exclusive with channel.
                      type: string
                    secretRef:
                      description: |-
                        SecretRef references Kubernetes Secrets holding credential values.
                        For single-secret credentials, use a one-element array.
                        For multi-secret channels (e.g., Slack), use role to distinguish entries.
                        Not required for type "none" (proxy allowlist, no auth) or channels that use
                        non-secret auth (e.g., WhatsApp QR pairing).
                      items:
                        description: SecretRefEntry references a specific key in a
                          Secret.
                        properties:
                          key:
                            description: Key is the key in the Secret's data map
                            minLength: 1
                            type: string
                          name:
                            description: Name is the name of the Secret
                            minLength: 1
                            type: string
                          role:
                            description: |-
                              Role distinguishes multiple secrets for the same credential.
                              Required when multiple secretRef entries are present (e.g., Slack botToken/appToken).
                            maxLength: 63
                            type: string
                        required:
                        - key
                        - name
                        type: object
                      type: array
                    type:
                      description: |-
                        Type selects the credential injection mechanism.
                        Optional when channel is set or provider is a known provider — the operator infers
                        the type from channel or provider defaults.
                      enum:
                      - apiKey
                      - bearer
                      - gcp
                      - pathToken
                      - oauth2
                      - none
                      - kubernetes
                      type: string
                  required:
                  - name
                  type: object
                  x-kubernetes-validations:
                  - message: 'type is required (inferred only for known providers:
                      google, anthropic, openai, xai, openrouter)'
                    rule: has(self.type) || has(self.channel) || (has(self.provider)
                      && self.provider in ['google', 'anthropic', 'openai', 'xai',
                      'openrouter'])
                  - message: provider and channel are mutually exclusive
                    rule: '!has(self.provider) || !has(self.channel)'
                  - message: secretRef is required unless type is none or channel
                      is set
                    rule: has(self.channel) || (has(self.type) && self.type == 'none')
                      || has(self.secretRef)
                  - message: apiKey config is required when type is apiKey without
                      inferred defaults
                    rule: '!has(self.type) || self.type != ''apiKey'' || has(self.apiKey)
                      || (has(self.provider) && self.provider in [''google'', ''anthropic''])
                      || has(self.channel)'
                  - message: gcp config is required when type is gcp without inferred
                      defaults
                    rule: '!has(self.type) || self.type != ''gcp'' || has(self.gcp)
                      || has(self.channel)'
                  - message: pathToken config is required when type is pathToken without
                      inferred defaults
                    rule: '!has(self.type) || self.type != ''pathToken'' || has(self.pathToken)
                      || has(self.channel)'
                  - message: oauth2 config is required when type is oauth2 without
                      inferred defaults
                    rule: '!has(self.type) || self.type != ''oauth2'' || has(self.oauth2)
                      || has(self.channel)'
                type: array
              customProviders:
                description: |-
                  CustomProviders declares custom OpenAI-compatible model providers.
                  Each entry generates a models.providers entry and registers its models
                  in the model picker. The referenced credential handles proxy routing.
                items:
                  description: CustomProviderSpec defines a custom OpenAI-compatible
                    model provider.
                  properties:
                    api:
                      allOf:
                      - enum:
                        - openai-completions
                        - openai-responses
                        - anthropic-messages
                        - ollama
                      - enum:
                        - openai-completions
                        - openai-responses
                        - anthropic-messages
                        - ollama
                      description: |-
                        API selects the wire format / request adapter OpenClaw uses when talking
                        to this provider. Defaults to "openai-completions" (standard /v1/chat/completions).
                      type: string
                    baseUrl:
                      description: |-
                        BaseUrl is the full base URL for the OpenAI-compatible API endpoint,
                        including any path prefix (e.g., "https://llm.mycompany.com/v1").
                      minLength: 1
                      pattern: ^https?://
                      type: string
                    credentialRef:
                      description: |-
                        CredentialRef is the name of a credential in spec.credentials that
                        handles proxy routing and authentication for this provider's domain.
                        The referenced credential does not need provider set — this field
                        establishes the linkage.
                      minLength: 1
                      type: string
                    models:
                      description: |-
                        Models lists the models available on this endpoint.
                        Each model is registered in agents.defaults.models with the provider
                        name prefix (e.g., "my-vllm/qwen3-14b").
                      items:
                        description: CustomModelEntry defines a single model on a
                          custom provider.
                        properties:
                          alias:
                            description: Alias is the human-friendly display name
                              shown in the model picker.
                            type: string
                          name:
                            description: Name is the model identifier as the endpoint
                              knows it (e.g., "qwen3-14b").
                            minLength: 1
                            type: string
                        required:
                        - name
                        type: object
                      minItems: 1
                      type: array
                    name:
                      description: |-
                        Name is the provider key used in models.providers and as the model prefix
                        (e.g., "my-vllm" -> models are referenced as "my-vllm/model-name").
                      minLength: 1
                      pattern: ^[a-z][a-z0-9-]*$
                      type: string
                  required:
                  - baseUrl
                  - credentialRef
                  - models
                  - name
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
              idle:
                default: false
                description: |-
                  Idle, when set to true, instructs the operator to scale all managed
                  Deployments to zero replicas. Set to false (or omit) to run normally.
                type: boolean
              logs:
                description: |-
                  Logs configures log forwarding via OTLP. The gateway sends logs directly
                  to spec.logs.endpoint, or spec.traces.endpoint when not specified.
                properties:
                  enabled:
                    description: Enabled activates log forwarding.
                    type: boolean
                  endpoint:
                    description: |-
                      Endpoint is the OTLP HTTP endpoint to forward logs to.
                      Defaults to the traces endpoint when not specified.
                    type: string
                type: object
              mcpServers:
                additionalProperties:
                  description: McpServerSpec defines an MCP server the operator injects
                    into OpenClaw's config.
                  properties:
                    args:
                      description: Args are command-line arguments for the stdio server.
                      items:
                        type: string
                      type: array
                    command:
                      description: Command is the executable for a stdio MCP server.
                      type: string
                    credentialRef:
                      description: |-
                        CredentialRef is the name of a credential in spec.credentials that
                        handles proxy routing and authentication for this MCP server's domain.
                        Only valid for HTTP MCP servers (url). The proxy injects credentials
                        so the gateway never sees raw tokens.
                      type: string
                    env:
                      additionalProperties:
                        type: string
                      description: |-
                        Env are plain environment variables passed to the stdio server process
                        and written into the MCP server config in operator.json.
                        Use for non-secret values and tier-2 placeholder tokens.
                      type: object
                    envFrom:
                      description: |-
                        EnvFrom are secret-backed environment variables mounted on the gateway
                        container and inherited by the stdio server subprocess (tier 3).
                        Use only when the proxy-placeholder pattern (tier 2) is not viable.
                      items:
                        description: |-
                          McpEnvFromSecret maps a Kubernetes Secret key to an environment variable
                          on the gateway container for tier 3 MCP secret injection.
                        properties:
                          name:
                            description: Name is the environment variable name.
                            minLength: 1
                            type: string
                          secretRef:
                            description: SecretRef references a key in a Kubernetes
                              Secret.
                            properties:
                              key:
                                description: Key is the key in the Secret's data map
                                minLength: 1
                                type: string
                              name:
                                description: Name is the name of the Secret
                                minLength: 1
                                type: string
                              role:
                                description: |-
                                  Role distinguishes multiple secrets for the same credential.
                                  Required when multiple secretRef entries are present (e.g., Slack botToken/appToken).
                                maxLength: 63
                                type: string
                            required:
                            - key
                            - name
                            type: object
                        required:
                        - name
                        - secretRef
                        type: object
                      type: array
                    transport:
                      description: |-
                        Transport selects the HTTP transport type ("streamable-http" or "sse").
                        Only valid when url is set.
                      enum:
                      - streamable-http
                      - sse
                      type: string
                    url:
                      description: URL is the endpoint for an HTTP MCP server.
                      type: string
                  type: object
                  x-kubernetes-validations:
                  - message: either command (stdio) or url (HTTP) must be set
                    rule: has(self.command) || has(self.url)
                  - message: command and url are mutually exclusive
                    rule: '!has(self.command) || !has(self.url)'
                  - message: envFrom is only allowed for stdio MCP servers (command),
                      not HTTP (url)
                    rule: '!has(self.url) || !has(self.envFrom) || size(self.envFrom)
                      == 0'
                  - message: transport is only allowed for HTTP MCP servers (url)
                    rule: '!has(self.transport) || has(self.url)'
                  - message: credentialRef is only allowed for HTTP MCP servers (url)
                    rule: '!has(self.credentialRef) || has(self.url)'
                description: |-
                  McpServers declares MCP servers injected into OpenClaw's config.
                  Map keys are server names as they appear in the mcp.servers config.
                type: object
              metrics:
                description: |-
                  Metrics configures Prometheus metrics for the gateway. The gateway sends
                  OTLP metrics to spec.traces.endpoint; a ServiceMonitor is created for
                  Prometheus scraping when enabled.
                properties:
                  enabled:
                    description: |-
                      Enabled activates diagnostics.otel.metrics config injection. The gateway
                      sends OTLP metrics to spec.traces.endpoint (shared with traces/logs).
                    type: boolean
                  port:
                    description: |-
                      Port for the Prometheus metrics endpoint exposed by the external OTel Collector.
                      Default: 9464.
                    format: int32
                    maximum: 65535
                    minimum: 1
                    type: integer
                  serviceMonitor:
                    description: ServiceMonitor configures Prometheus Operator ServiceMonitor
                      creation.
                    properties:
                      enabled:
                        description: |-
                          Enabled controls whether a ServiceMonitor is created. Default: true
                          (when metrics.enabled is true).
                        type: boolean
                      interval:
                        description: 'Interval is the Prometheus scrape interval.
                          Default: "30s".'
                        type: string
                    type: object
                type: object
              network:
                description: |-
                  Network configures network behavior for the gateway pod.
                  Controls in-cluster proxy bypass and additional egress rules.
                  MCP server egress rules are auto-generated from spec.mcpServers URLs.
                properties:
                  additionalEgress:
                    description: |-
                      AdditionalEgress appends raw NetworkPolicy egress rules to the
                      gateway's egress policy for targets the operator can't auto-detect:
                      tracing collectors, databases, webhooks, etc.
                      Rules are appended to {instance}-egress.
                    items:
                      description: |-
                        NetworkPolicyEgressRule describes a particular set of traffic that is allowed out of pods
                        matched by a NetworkPolicySpec's podSelector. The traffic must match both ports and to.
                        This type is beta-level in 1.8
                      properties:
                        ports:
                          description: |-
                            ports is a list of destination ports for outgoing traffic.
                            Each item in this list is combined using a logical OR. If this field is
                            empty or missing, this rule matches all ports (traffic not restricted by port).
                            If this field is present and contains at least one item, then this rule allows
                            traffic only if the traffic matches at least one port in the list.
                          items:
                            description: NetworkPolicyPort describes a port to allow
                              traffic on
                            properties:
                              endPort:
                                description: |-
                                  endPort indicates that the range of ports from port to endPort if set, inclusive,
                                  should be allowed by the policy. This field cannot be defined if the port field
                                  is not defined or if the port field is defined as a named (string) port.
                                  The endPort must be equal or greater than port.
                                format: int32
                                type: integer
                              port:
                                anyOf:
                                - type: integer
                                - type: string
                                description: |-
                                  port represents the port on the given protocol. This can either be a numerical or named
                                  port on a pod. If this field is not provided, this matches all port names and
                                  numbers.
                                  If present, only traffic on the specified protocol AND port will be matched.
                                x-kubernetes-int-or-string: true
                              protocol:
                                description: |-
                                  protocol represents the protocol (TCP, UDP, or SCTP) which traffic must match.
                                  If not specified, this field defaults to TCP.
                                type: string
                            type: object
                          type: array
                          x-kubernetes-list-type: atomic
                        to:
                          description: |-
                            to is a list of destinations for outgoing traffic of pods selected for this rule.
                            Items in this list are combined using a logical OR operation. If this field is
                            empty or missing, this rule matches all destinations (traffic not restricted by
                            destination). If this field is present and contains at least one item, this rule
                            allows traffic only if the traffic matches at least one item in the to list.
                          items:
                            description: |-
                              NetworkPolicyPeer describes a peer to allow traffic to/from. Only certain combinations of
                              fields are allowed
                            properties:
                              ipBlock:
                                description: |-
                                  ipBlock defines policy on a particular IPBlock. If this field is set then
                                  neither of the other fields can be.
                                properties:
                                  cidr:
                                    description: |-
                                      cidr is a string representing the IPBlock
                                      Valid examples are "192.168.1.0/24" or "2001:db8::/64"
                                    type: string
                                  except:
                                    description: |-
                                      except is a slice of CIDRs that should not be included within an IPBlock
                                      Valid examples are "192.168.1.0/24" or "2001:db8::/64"
                                      Except values will be rejected if they are outside the cidr range
                                    items:
                                      type: string
                                    type: array
                                    x-kubernetes-list-type: atomic
                                required:
                                - cidr
                                type: object
                              namespaceSelector:
                                description: |-
                                  namespaceSelector selects namespaces using cluster-scoped labels. This field follows
                                  standard label selector semantics; if present but empty, it selects all namespaces.

                                  If podSelector is also set, then the NetworkPolicyPeer as a whole selects
                                  the pods matching podSelector in the namespaces selected by namespaceSelector.
                                  Otherwise it selects all pods in the namespaces selected by namespaceSelector.
                                properties:
                                  matchExpressions:
                                    description: matchExpressions is a list of label
                                      selector requirements. The requirements are
                                      ANDed.
                                    items:
                                      description: |-
                                        A label selector requirement is a selector that contains values, a key, and an operator that
                                        relates the key and values.
                                      properties:
                                        key:
                                          description: key is the label key that the
                                            selector applies to.
                                          type: string
                                        operator:
                                          description: |-
                                            operator represents a key's relationship to a set of values.
                                            Valid operators are In, NotIn, Exists and DoesNotExist.
                                          type: string
                                        values:
                                          description: |-
                                            values is an array of string values. If the operator is In or NotIn,
                                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                                            the values array must be empty. This array is replaced during a strategic
                                            merge patch.
                                          items:
                                            type: string
                                          type: array
                                          x-kubernetes-list-type: atomic
                                      required:
                                      - key
                                      - operator
                                      type: object
                                    type: array
                                    x-kubernetes-list-type: atomic
                                  matchLabels:
                                    additionalProperties:
                                      type: string
                                    description: |-
                                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                                    type: object
                                type: object
                                x-kubernetes-map-type: atomic
                              podSelector:
