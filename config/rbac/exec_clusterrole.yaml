apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  # kustomize namePrefix "claw-operator-" → deployed name: claw-operator-exec-role
  # This ClusterRole is NEVER bound cluster-wide. The reconciler creates a
  # namespace-scoped RoleBinding per Claw CR instance, limiting exec access
  # to only those namespaces with active Claw deployments.
  name: exec-role
  labels:
    app.kubernetes.io/name: claw-operator
    app.kubernetes.io/managed-by: kustomize
rules:
- apiGroups:
  - ""
  resources:
  - pods/exec
  verbs:
  - create
