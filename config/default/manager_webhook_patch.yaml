# Adds the webhook serving port and mounts the TLS certificate Secret into the
# manager container. The Secret (webhook-server-cert) is populated by the
# OpenShift service CA operator on OpenShift, or by hack/kind-webhook-setup.sh
# on plain Kubernetes / Kind clusters.
- op: add
  path: /spec/template/spec/containers/0/ports
  value:
  - containerPort: 9443
    name: webhook-server
    protocol: TCP
- op: add
  path: /spec/template/spec/containers/0/volumeMounts
  value:
  - mountPath: /tmp/k8s-webhook-server/serving-certs
    name: cert
    readOnly: true
- op: add
  path: /spec/template/spec/volumes
  value:
  - name: cert
    secret:
      defaultMode: 420
      secretName: webhook-server-cert
- op: add
  path: /spec/template/spec/containers/0/args/-
  value: --webhook-cert-path=/tmp/k8s-webhook-server/serving-certs
